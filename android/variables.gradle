ext {
    // API 28+ (Android 9): passkey create/get through Android Credential Manager
    // is only backed by Google Play Services from here up; on older releases the
    // ceremony fails. This native build exists to do passkeys, so it should not
    // install where they cannot work. Was 24 (the Capacitor default).
    minSdkVersion = 28
    compileSdkVersion = 36
    targetSdkVersion = 36
    androidxActivityVersion = '1.11.0'
    androidxAppCompatVersion = '1.7.1'
    androidxCoordinatorLayoutVersion = '1.3.0'
    androidxCoreVersion = '1.17.0'
    androidxFragmentVersion = '1.8.9'
    coreSplashScreenVersion = '1.2.0'
    androidxWebkitVersion = '1.14.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.3.0'
    androidxEspressoCoreVersion = '3.7.0'
    cordovaAndroidVersion = '14.0.1'
}