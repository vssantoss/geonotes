<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Short notes tied to the places where they matter." />
    <meta name="theme-color" content="#f1f2eb" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <title>GeoNotes</title>
    <script>
      // Apply the stored theme before first paint to avoid a light flash.
      // Kept in sync with THEME_STORAGE_KEY / THEME_COLOR / CHOICE_TTL_MS in
      // src/lib/theme.tsx: an explicit choice wins until it expires, otherwise
      // follow the OS.
      ;(function () {
        var choice = null
        try {
          var raw = localStorage.getItem('geonotes-theme')
          if (raw) {
            var parsed = JSON.parse(raw)
            if (
              (parsed.value === 'light' || parsed.value === 'dark') &&
              typeof parsed.expires === 'number' &&
              Date.now() < parsed.expires
            ) {
              choice = parsed.value
            }
          }
        } catch (e) {
          /* absent, malformed or blocked: fall back to the OS */
        }
        var dark = choice
          ? choice === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches
        if (dark) {
          document.documentElement.classList.add('dark')
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', '#161a17')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
