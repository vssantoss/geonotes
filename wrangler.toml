# Cloudflare Pages configuration.
# Victor: after creating the D1 database in the Cloudflare dashboard or via
# `pnpm wrangler d1 create geonotes`, paste the real database_id below.
# Also set the challenge-signing secret once (any long random string):
#   pnpm wrangler pages secret put AUTH_SECRET
# Apply the schema with:
#   local:  pnpm wrangler d1 migrations apply geonotes --local
#   remote: pnpm wrangler d1 migrations apply geonotes --remote

name = "geonotes"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

[vars]
ENVIRONMENT = "production"
# WebAuthn relying party: must match the domain the app is served from.
RP_ID = "geonotes.pages.dev"
ORIGIN = "https://geonotes.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "geonotes"
database_id = "REPLACE_WITH_REAL_D1_ID"
