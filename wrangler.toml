# Cloudflare Worker configuration (Worker + static assets).
# Set the secrets once each (no --project-name; these target the Worker named
# below):
#   pnpm wrangler secret put AUTH_SECRET
#   pnpm wrangler secret put RESEND_API_KEY
#   pnpm wrangler secret put TURNSTILE_SECRET
# Apply the schema with:
#   local:  pnpm wrangler d1 migrations apply geonotes --local
#   remote: pnpm wrangler d1 migrations apply geonotes --remote

# Named "geonotes-worker" because "geonotes" belonged to the Pages project this
# replaced, which had to stay deployed alongside it during the cutover. That
# project was deleted on 2026-07-21, so the name is free now, but renaming a
# Worker creates a new one rather than renaming in place: it would drop the
# custom domain, the secrets and the deploy history. Not worth it. Note
# "geonotes" is still the D1 database name above, and is unaffected.
name = "geonotes-worker"
main = "worker/index.ts"
compatibility_date = "2026-07-01"

[assets]
directory = "./dist"
binding = "ASSETS"
# Deep links are client-routed, so anything that is not a built asset must come
# back as index.html. Pages did this implicitly; on Workers it is explicit.
not_found_handling = "single-page-application"
# A request matching a real file is answered by the asset server without ever
# invoking the Worker, which would silently skip serveSite's non-production
# renaming for exactly the two documents that carry the name (a deep link still
# reached it, via the SPA fallback above, so the bug showed up only on the paths
# users actually install from). Listing them here forces the Worker to run first.
# Everything else, including all content-hashed assets, keeps the direct path.
run_worker_first = ["/*", "!/assets/*"]

[vars]
ENVIRONMENT = "production"
# WebAuthn relying party: must match the domain the app is served from.
RP_ID = "gnotes.vshub.app"
ORIGIN = "https://gnotes.vshub.app"
# Android Credential Manager assertion origin: base64url(SHA-256(signing cert)).
# Accepted alongside ORIGIN so native passkey assertions verify. This is the
# DEBUG keystore fingerprint; add the Play App Signing one when the app ships to
# Play Console (it is what signs installed release builds). Matches the
# sha256_cert_fingerprints in public/.well-known/assetlinks.json.
ANDROID_PASSKEY_ORIGIN = "android:apk-key-hash:_hchXF3YGzJecO0KWrVzATWXsLQal-feFgCgN56PPpg"

[[d1_databases]]
binding = "DB"
database_name = "geonotes"
database_id = "0fda6ffd-fc0e-49e1-900a-c421b64309e4"

# Per-IP throttle for /api/auth/*, enforced by enforceAuthAbuseLimit. This is
# per-colo and eventually consistent, so it is the cheap inner layer that fails
# fast before D1, NOT a replacement for the zone's WAF Rate Limiting Rule. Keep
# both. namespace_id is an arbitrary account-unique integer, not provisioned
# anywhere; period only accepts 10 or 60.
[[ratelimits]]
name = "AUTH_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# Daily sweep of accounts past their 30-day deletion grace window, plus expired
# e-mail codes. Pages had no cron, which is why these used to ride on
# email-request.
[triggers]
crons = ["17 4 * * *"]

[observability]
enabled = true
